services:
  velox:
    build: .
    container_name: velox-v6
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8080/health'); assert r.status_code == 200"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
