name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run V6 tests
        run: |
          pytest tests/ \
            --ignore=tests/test_risk.py \
            --ignore=tests/test_strategies.py \
            --ignore=tests/test_exit_manager.py \
            --ignore=tests/test_news_filter.py \
            -v --tb=short \
            --cov=. --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check imports
        run: |
          pip install -r requirements.txt
          python -c "import config; import main; print('All imports OK')"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t velox-v6 .

      - name: Verify container starts
        run: |
          docker run --rm velox-v6 python -c "import main; print('Container OK')"
